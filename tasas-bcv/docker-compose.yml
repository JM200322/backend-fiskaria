services:
  api:
    build:
      context: .
    image: tasas-bcv:latest
    container_name: tasas-bcv-api
    env_file:
      - .env
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 3000
      NODE_ENV: production
      TZ: America/Caracas
    ports:
      - "3000:3000"
    command: sh -c "npm run db:setup:prod && node dist/main.js"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  bcv-scheduler:
    image: tasas-bcv:latest
    container_name: tasas-bcv-scheduler
    env_file:
      - .env
    environment:
      NODE_ENV: production
      TZ: America/Caracas
      BCV_SYNC_HOURS: "8,14,20"
      BCV_SYNC_RUN_ON_START: "0"
    command: node dist/scheduler.js
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
